# Manifesto legivel por maquina — fonte da verdade estrutural do Company OS.
# Agentes de IA e ferramentas consultam este arquivo para orquestrar trabalho.
schema_version: 1
name: "saude-os"            # <- nome de trabalho; renomear aqui
legal_name: "A definir"
mission:
  care: "Assistencia medica premium baseada em evidencias"
  research: "Pesquisa clinica com integridade e etica (CEP/CONEP)"
  education: "Ensino e formacao continuada"
principles:
  - one-canonical-home
  - documentation-as-code
  - domain-driven-design
  - clean-architecture
  - evidence-based-medicine
  - privacy-by-design-lgpd
  - continuous-improvement-pdca
# Precedencia em caso de conflito (canonico: 00-company/governance/principles.md)
principles_precedence:
  - patient-safety
  - ethics-and-legal
  - scientific-evidence
  - operational-excellence
  - automation-and-ai
governance:
  model: executive-council          # canonico: 00-company/governance/README.md
  decision_record: MADR
  council_roles: [ceo, coo, cfo, cmo, cio, cto, medical-director,
                  scientific-director, patient-experience-director,
                  legal-director, quality-director, bi-director]
ai:
  agents_registry: 90-meta/catalog/agents.yaml
  human_in_the_loop_for_clinical: true
top_level_areas:
  - { path: "00-company",     type: permanent, owner: ceo }
  - { path: "10-domains",     type: permanent, owner: chief-systems-architect }
  - { path: "20-platform",    type: permanent, owner: cto }
  - { path: "30-operations",  type: permanent, owner: coo }
  - { path: "40-quality",     type: permanent, owner: quality-officer }
  - { path: "50-growth",      type: permanent, owner: cgo }
  - { path: "70-initiatives", type: temporary, owner: pmo }
  - { path: "90-meta",        type: permanent, owner: chief-systems-architect }
data_boundary:
  phi_in_repo: false          # DADO DE PACIENTE NUNCA ENTRA NESTE REPOSITORIO
  interoperability: HL7-FHIR
standards:
  adr: MADR
  docs: Diataxis
  diagrams: C4
  commits: conventional-commits
  versioning: semver
  quality: ISO-9001
  security: ISO-27001
  privacy: ISO-27701 + LGPD
  accreditation: [ONA, JCI]
inspirations:
  tech: [amazon, stripe, gitlab]
  health: [mayo-clinic, cleveland-clinic, einstein, sirio-libanes]
  methods: [lean-healthcare, lean-startup, toyota-production-system]
  norms: [ISO-9001, ISO-27001, ISO-27701, ONA, JCI, HL7-FHIR]
